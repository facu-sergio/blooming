<mat-card class="metric-card">
  <mat-card-header>
    <mat-icon mat-card-avatar>calendar_month</mat-icon>
    <mat-card-title
      matTooltip="Suma de los recargos aplicados a los productos vendidos este mes"
      matTooltipPosition="above"
    >Ganancias del Mes</mat-card-title>
  </mat-card-header>
  <mat-card-content>
    <p class="metric-value">{{ monthlyProfits().totalProfit | currency: 'ARS' : '$' : '1.0-0' }}</p>
    <p class="metric-subtitle">{{ monthlyProfits().orderCount }} pedido(s) entregado(s)</p>
  </mat-card-content>
</mat-card>
