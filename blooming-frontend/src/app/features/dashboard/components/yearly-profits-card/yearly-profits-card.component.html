<mat-card class="metric-card">
  <mat-card-header>
    <mat-icon mat-card-avatar>calendar_today</mat-icon>
    <mat-card-title
      matTooltip="Suma de los recargos aplicados a los productos vendidos este año"
      matTooltipPosition="above"
    >Ganancias del Año</mat-card-title>
  </mat-card-header>
  <mat-card-content>
    <p class="metric-value">{{ yearlyProfits().totalProfit | currency: 'ARS' : '$' : '1.0-0' }}</p>
    <p class="metric-subtitle">{{ yearlyProfits().orderCount }} pedido(s) entregado(s)</p>
  </mat-card-content>
</mat-card>
