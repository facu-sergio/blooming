<div class="category-list-container">
  <mat-card>
    <mat-card-header>
      <mat-card-title>Categorías</mat-card-title>
      <div class="header-actions">
        <button mat-raised-button color="primary" (click)="openCreateDialog()">
          <mat-icon>add</mat-icon>
          Nueva categoría
        </button>
      </div>
    </mat-card-header>

    <mat-card-content>
      @if (isLoading()) {
        <div class="loading-container">
          <mat-spinner diameter="40" />
        </div>
      } @else if (categories().length === 0) {
        <div class="empty-state">
          <mat-icon>category</mat-icon>
          <p>No hay categorías creadas. Crea la primera para poder agregar productos.</p>
        </div>
      } @else {
        <table mat-table [dataSource]="categories()" class="full-width">
          <ng-container matColumnDef="name">
            <th mat-header-cell *matHeaderCellDef>Nombre</th>
            <td mat-cell *matCellDef="let category">{{ category.name }}</td>
          </ng-container>

          <ng-container matColumnDef="description">
            <th mat-header-cell *matHeaderCellDef>Descripción</th>
            <td mat-cell *matCellDef="let category">{{ category.description || '—' }}</td>
          </ng-container>

          <ng-container matColumnDef="actions">
            <th mat-header-cell *matHeaderCellDef>Acciones</th>
            <td mat-cell *matCellDef="let category">
              <button mat-icon-button (click)="openEditDialog(category)" aria-label="Editar">
                <mat-icon>edit</mat-icon>
              </button>
              <button
                mat-icon-button
                color="warn"
                (click)="deleteCategory(category)"
                aria-label="Eliminar"
              >
                <mat-icon>delete</mat-icon>
              </button>
            </td>
          </ng-container>

          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
        </table>
      }
    </mat-card-content>
  </mat-card>
</div>
