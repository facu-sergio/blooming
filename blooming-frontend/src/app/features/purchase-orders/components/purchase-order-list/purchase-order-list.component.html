<mat-card>
  <mat-card-header>
    <mat-card-title>Órdenes de Compra</mat-card-title>
    <span class="spacer"></span>
    <button mat-flat-button color="primary" (click)="navigateToNew()">
      <mat-icon>add</mat-icon>
      Nueva Orden
    </button>
  </mat-card-header>

  <mat-card-content>
    <div *ngIf="isLoading()" class="loading-container">
      <mat-spinner diameter="48"></mat-spinner>
    </div>

    <div *ngIf="!isLoading() && purchaseOrders().length === 0" class="empty-state">
      <mat-icon>shopping_cart</mat-icon>
      <p>No hay órdenes de compra registradas.</p>
      <button mat-stroked-button color="primary" (click)="navigateToNew()">Registrar primera orden</button>
    </div>

    <mat-table *ngIf="!isLoading() && purchaseOrders().length > 0" [dataSource]="purchaseOrders()">
      <ng-container matColumnDef="id">
        <mat-header-cell *matHeaderCellDef>#</mat-header-cell>
        <mat-cell *matCellDef="let order">{{ order.id }}</mat-cell>
      </ng-container>

      <ng-container matColumnDef="supplierName">
        <mat-header-cell *matHeaderCellDef>Proveedor</mat-header-cell>
        <mat-cell *matCellDef="let order">{{ order.supplierName }}</mat-cell>
      </ng-container>

      <ng-container matColumnDef="orderDate">
        <mat-header-cell *matHeaderCellDef>Fecha</mat-header-cell>
        <mat-cell *matCellDef="let order">{{ order.orderDate | date: 'dd/MM/yyyy' }}</mat-cell>
      </ng-container>

      <ng-container matColumnDef="itemCount">
        <mat-header-cell *matHeaderCellDef>Ítems</mat-header-cell>
        <mat-cell *matCellDef="let order">{{ order.itemCount }}</mat-cell>
      </ng-container>

      <ng-container matColumnDef="totalAmount">
        <mat-header-cell *matHeaderCellDef>Total</mat-header-cell>
        <mat-cell *matCellDef="let order">${{ order.totalAmount | number: '1.2-2' }}</mat-cell>
      </ng-container>

      <ng-container matColumnDef="actions">
        <mat-header-cell *matHeaderCellDef></mat-header-cell>
        <mat-cell *matCellDef="let order">
          <button mat-icon-button (click)="viewDetail(order)" title="Ver detalle">
            <mat-icon>visibility</mat-icon>
          </button>
        </mat-cell>
      </ng-container>

      <mat-header-row *matHeaderRowDef="displayedColumns"></mat-header-row>
      <mat-row *matRowDef="let row; columns: displayedColumns" class="clickable-row" (click)="viewDetail(row)"></mat-row>
    </mat-table>
  </mat-card-content>
</mat-card>
